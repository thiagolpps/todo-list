<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Tarefa</title>
    <link rel="stylesheet" href="../../public/css/style.css">
</head>

<body class="container-newtask">
    <header>
        <h1 class="title-newtask">
            Criar nova Tarefa
        </h1>

        <nav>
            <ul>
                <li><a href="../../public/index.html">Ver Tarefas</a></li>
                <li><a href="newtask.html">Nova Tarefa</a></li>
                <li><a href="../settings/settings.html">Configurações</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-new" id="main-new">
        <form class="cardForm" id="cardForm">
            <div class="displaycolor">
                <p>Escolha a cor de destaque: </p>
                <input type="color" class="cardColor" id="cardColor" required>
            </div>
            <p>Nome:</p>
            <input type="text" id="cardName" required>
            <p>Descrição:</p>
            <textarea id="cardDescription" required></textarea>

            <div class="displaybutton">
                <button type="submit" class="cardButton" id="cardButton">Enviar</button>
            </div>
        </form>
    </main>

    <script src="../../public/js/script.js"></script>
</body>

</html>
